[core]
# Supported keys
dags_folder = /usr/local/airflow/dags
executor = CeleryExecutor
parallelism = 32
max_active_tasks_per_dag = 16
max_active_runs_per_dag = 16
default_timezone = utc
load_examples = False

# Unsupported key - MWAA manages the SQL connection internally
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@localhost/airflow

# Unsupported key - MWAA manages the broker
broker_url = redis://redis:6379/0

[scheduler]
# Supported keys
min_file_process_interval = 30
dag_dir_list_interval = 300
parsing_processes = 2
catchup_by_default = True

# Unsupported key
statsd_on = True

[webserver]
# Supported keys
dag_default_view = grid
page_size = 100
expose_config = False
instance_name = My Airflow

# Unsupported key - MWAA manages the web server
web_server_port = 8080

# Unsupported key with filesystem path
base_log_folder = /var/log/airflow

[celery]
# Supported keys
worker_concurrency = 16
default_queue = default

# Unsupported key
broker_url = redis://redis:6379/0

[logging]
# Supported keys
logging_level = INFO
remote_logging = True
remote_log_conn_id = aws_default
remote_base_log_folder = s3://my-bucket/airflow-logs

[smtp]
# Supported keys
smtp_host = email-smtp.us-east-1.amazonaws.com
smtp_starttls = True
smtp_port = 587
smtp_mail_from = airflow@example.com
